# 模式 train:训练 predict:预测
mode=train
# cuda cpu apple
coreType=apple

# 推理
boardSize=20
numGames=100
numSimulation=200
explorationFactor=5

# 训练
numProcesses=2
lr = 1e-4
wd = 1e-4
batchSize = 256
episode = 400
temperatureDefault=1
temperatureDownBeginStep = 4
randomRate=0.9
useVct=false
trainEpochs = 3
replayBufferSize = 100000

# 文件路径
; cppPath=../out/build/x64-Release/ego-zero.exe
cppPath=../cmake-build-debug/ego-gomoku-zero
modelPath=./model/model_best.onnx

# Elo 评估
evalInterval = 1000
evalGames = 40
evalSimulation = 100

# Arena 门槛准入
arenaInterval = 500
arenaGames = 40
arenaSimulation = 100
arenaWinRateThreshold = 0.55
arenaMaxSkip = 10